services:
  vllm:
    image: vllm/vllm-openai:v0.6.3
    container_name: vllm
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - NVIDIA_VISIBLE_DEVICES=all
      # Variável para evitar fragmentação de memória PyTorch
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    volumes:
      - hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]
    # CORREÇÃO: Apenas os argumentos, SEM o comando python
    command:
      - "--model"
      - "${MODEL_ID:-Qwen/Qwen2.5-0.5B-Instruct}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--api-key"
      - "${VLLM_API_KEY:-local-dev-key}"
      - "--gpu-memory-utilization"
      - "${GPU_MEM_UTIL:-0.75}"
      - "--max-model-len"
      - "${MAX_MODEL_LEN:-4096}"
      - "--max-num-seqs"
      - "${MAX_NUM_SEQS:-64}"
      - "--dtype"
      - "float16"
      - "--enforce-eager"
    # IPC host para compartilhamento de memória
    ipc: host
    # Ulimits para memória travada
    ulimits:
      memlock: -1
      stack: 67108864

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  hf-cache:
  prom-data:
  grafana-data: